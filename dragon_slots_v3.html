<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dragon Slots Machine — Raiku</title>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --black:#000204;--white:#FDFDFF;--neon:#C0FF38;--neon-dim:#8ab828;
  --border:#1a1f1a;--gold:#FFD700;
}
html,body{width:100%;min-height:100vh;background:var(--black);}
body{
  display:flex;align-items:center;justify-content:center;
  font-family:'Geist Mono',monospace;color:var(--white);
  padding:2rem 1rem;overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:999;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);
}

.wrap{display:flex;flex-direction:column;align-items:center;gap:2rem;max-width:560px;width:100%;}

.header{display:flex;flex-direction:column;align-items:center;gap:0.5rem;}
.logo-line{display:flex;align-items:center;gap:0.75rem;}
.logo-symbol{
  width:32px;height:32px;border:1.5px solid var(--neon);border-radius:4px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;font-weight:600;color:var(--neon);
  animation:symbolPulse 4s ease-in-out infinite;
}
@keyframes symbolPulse{0%,100%{box-shadow:0 0 0 0 transparent}50%{box-shadow:0 0 12px 2px #C0FF3840}}
.logo-text{font-size:1.5rem;font-weight:600;letter-spacing:0.08em;color:var(--white);text-transform:uppercase;}
.tagline{font-size:0.6rem;letter-spacing:0.3em;color:var(--neon-dim);text-transform:uppercase;font-weight:300;}

.machine{width:100%;border:1px solid var(--border);border-radius:2px;overflow:hidden;position:relative;}
.machine-top{
  background:var(--black);border-bottom:1px solid var(--border);
  padding:0.75rem 1.25rem;display:flex;justify-content:space-between;align-items:center;
}
.machine-label{font-size:0.55rem;letter-spacing:0.25em;color:#444;text-transform:uppercase;}
.machine-val{font-size:0.7rem;color:var(--neon);letter-spacing:0.1em;}
.blink::after{content:'_';animation:blink 1s step-end infinite;}
@keyframes blink{50%{opacity:0}}

.reels-area{background:#030605;padding:2rem 1.5rem;position:relative;}
#particleCanvas{position:absolute;inset:0;pointer-events:none;z-index:20;width:100%;height:100%;}

.win-line{
  position:absolute;top:50%;left:1.5rem;right:1.5rem;height:1px;
  background:linear-gradient(90deg,transparent,var(--neon),transparent);
  transform:translateY(-50%);opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:15;
}
.win-line.active{opacity:1;animation:wlp 0.45s ease-in-out infinite alternate;box-shadow:0 0 15px var(--neon),0 0 30px #C0FF3860;}
.win-line.gold{background:linear-gradient(90deg,transparent,var(--gold),transparent);box-shadow:0 0 15px var(--gold),0 0 30px #FFD70060;}
@keyframes wlp{from{opacity:0.6}to{opacity:1}}

.reels{display:flex;gap:0.75rem;justify-content:center;}
.reel{
  flex:1;max-width:160px;aspect-ratio:1/1;
  border:1px solid var(--border);border-radius:2px;
  overflow:hidden;position:relative;background:#000;
  transition:border-color 0.15s,box-shadow 0.15s;
}
.reel::before{
  content:'';position:absolute;inset:0;z-index:3;pointer-events:none;
  background:linear-gradient(to bottom,
    #000204f0 0%,#000204bb 18%,
    transparent 32%,transparent 68%,
    #000204bb 82%,#000204f0 100%);
}
.reel.spinning{border-color:#1a2a0a;animation:reelShake 0.12s linear infinite;}
@keyframes reelShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-0.5px)}75%{transform:translateX(0.5px)}}
.reel.landed{animation:landFlash 0.5s ease-out forwards;}
@keyframes landFlash{0%{border-color:var(--neon);box-shadow:0 0 20px #C0FF3870}100%{border-color:var(--border);box-shadow:none}}
.reel.landed-gold{animation:landFlashGold 0.5s ease-out forwards;}
@keyframes landFlashGold{0%{border-color:var(--gold);box-shadow:0 0 20px #FFD70090}100%{border-color:var(--border);box-shadow:none}}
.reel.jackpot-glow{animation:jackpotGlow 0.6s ease-in-out infinite alternate;}
@keyframes jackpotGlow{from{border-color:var(--gold);box-shadow:0 0 15px #FFD70080}to{border-color:#fff8;box-shadow:0 0 35px #FFD700cc,0 0 60px #FFD70050}}

/* SHUFFLE EFFECT */
.reel.shuffling .reel-inner{animation:shufflePulse 0.08s ease-in-out infinite;}
@keyframes shufflePulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.4) saturate(1.3)}}

.reel-inner{display:flex;flex-direction:column;will-change:transform;}
.sym{width:100%;flex-shrink:0;overflow:hidden;aspect-ratio:1/1;position:relative;}
.sym img{width:100%;height:100%;object-fit:cover;display:block;}

/* SHUFFLE OVERLAY on sym */
.sym.shuffle-flash{animation:symFlash 0.07s ease-out;}
@keyframes symFlash{0%{opacity:0.3}100%{opacity:1}}

.machine-bottom{border-top:1px solid var(--border);padding:1.25rem 1.5rem;display:flex;flex-direction:column;gap:1rem;background:var(--black);}

.msg{
  text-align:center;font-size:0.65rem;letter-spacing:0.2em;
  color:#444;min-height:1.5rem;transition:all 0.3s;text-transform:uppercase;
}
.msg.win{color:var(--neon);text-shadow:0 0 10px #C0FF3880;animation:mp 0.3s 3;}
.msg.jackpot{color:var(--gold);font-size:1rem;letter-spacing:0.3em;font-weight:600;animation:mp 0.25s 8;text-shadow:0 0 20px var(--gold),0 0 40px #FFD70060;}
@keyframes mp{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}

.spin-btn{
  width:100%;padding:0.9rem;
  background:var(--neon);border:none;border-radius:2px;
  color:var(--black);font-family:'Geist Mono',monospace;
  font-size:0.8rem;font-weight:600;letter-spacing:0.3em;
  cursor:pointer;text-transform:uppercase;transition:all 0.15s;
  position:relative;overflow:hidden;
}
.spin-btn::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,0.15);opacity:0;transition:opacity 0.15s;}
.spin-btn:hover::after{opacity:1;}
.spin-btn:hover{box-shadow:0 0 25px #C0FF3860;}
.spin-btn:active{transform:scale(0.99);}
.spin-btn:disabled{background:#1a2a0a;color:#4a6a14;cursor:not-allowed;box-shadow:none;}
.spin-btn.pulse-ring::before{content:'';position:absolute;inset:-4px;border:2px solid var(--neon);border-radius:4px;animation:ringOut 0.4s ease-out forwards;}
@keyframes ringOut{to{inset:-12px;opacity:0;}}

.dots{display:flex;gap:0.5rem;justify-content:center;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--border);transition:background 0.3s,box-shadow 0.3s;}
.dot.active-neon{background:var(--neon);box-shadow:0 0 6px var(--neon);}
.dot.active-gold{background:var(--gold);box-shadow:0 0 8px var(--gold),0 0 16px #FFD70060;}

/* ── JACKPOT POPUP ── */
.jackpot-overlay{
  position:fixed;inset:0;z-index:500;
  display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,0.85);
  opacity:0;pointer-events:none;transition:opacity 0.3s;
}
.jackpot-overlay.show{opacity:1;pointer-events:all;}
.jackpot-popup{
  border:1px solid var(--gold);border-radius:2px;
  background:#000204;
  padding:2.5rem 3rem;
  text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:1.5rem;
  position:relative;overflow:hidden;
  animation:popupIn 0.4s cubic-bezier(0.175,0.885,0.32,1.275) both;
  max-width:380px;width:90%;
}
@keyframes popupIn{from{transform:scale(0.7);opacity:0}to{transform:scale(1);opacity:1}}
.jackpot-popup::before{
  content:'';position:absolute;inset:-2px;
  background:linear-gradient(135deg,#FFD700,#8b6914,#FFD700,#8b6914,#FFD700);
  background-size:400% 400%;z-index:-1;
  animation:borderSpin 3s linear infinite;
}
@keyframes borderSpin{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.popup-crown{font-size:3rem;animation:crownBounce 0.6s ease-in-out infinite alternate;}
@keyframes crownBounce{from{transform:translateY(0)}to{transform:translateY(-6px)}}
.popup-title{
  font-family:'Geist Mono',monospace;font-size:clamp(1.3rem,5vw,1.8rem);
  font-weight:600;letter-spacing:0.15em;
  color:var(--gold);text-shadow:0 0 20px #FFD700,0 0 40px #FFD70060;
  text-transform:uppercase;
}
.popup-sub{
  font-size:0.7rem;letter-spacing:0.3em;color:#8ab828;text-transform:uppercase;
}
.popup-close{
  padding:0.6rem 2rem;background:var(--gold);border:none;border-radius:2px;
  color:var(--black);font-family:'Geist Mono',monospace;font-size:0.75rem;
  font-weight:600;letter-spacing:0.2em;cursor:pointer;text-transform:uppercase;
  transition:all 0.15s;
}
.popup-close:hover{box-shadow:0 0 20px #FFD70060;}

.conf-wrap{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:300;}
.cp{position:absolute;top:-10px;animation:cf linear forwards;}
@keyframes cf{to{transform:translateY(105vh) rotate(720deg);opacity:0}}

.flash-overlay{position:fixed;inset:0;pointer-events:none;z-index:190;background:var(--gold);opacity:0;}
.flash-overlay.flash{animation:screenFlash 0.25s ease-out forwards;}
@keyframes screenFlash{0%{opacity:0.2}100%{opacity:0}}

.mute-btn{
  position:fixed;top:1rem;right:1rem;
  background:transparent;border:1px solid var(--border);border-radius:2px;
  color:#444;font-family:'Geist Mono',monospace;font-size:0.55rem;
  letter-spacing:0.15em;padding:0.4rem 0.6rem;cursor:pointer;
  transition:all 0.15s;text-transform:uppercase;z-index:50;
}
.mute-btn:hover{border-color:var(--neon);color:var(--neon);}

.hint{font-size:0.5rem;letter-spacing:0.2em;color:#454c54;text-align:center;text-transform:uppercase;}
</style>
</head>
<body>
<div class="flash-overlay" id="flashOverlay"></div>
<button class="mute-btn" id="muteBtn" onclick="toggleMute()">SOUND ON</button>

<!-- JACKPOT POPUP -->
<div class="jackpot-overlay" id="jpOverlay">
  <div class="jackpot-popup">
    <div class="popup-crown">👑</div>
    <div class="popup-title">JACKPOT</div>
    <div class="popup-sub">You are the fuckin chosen Chad</div>
    <button class="popup-close" onclick="closeJackpot()">CLAIM GLORY</button>
  </div>
</div>

<div class="wrap">
  <div class="header">
    <div class="logo-line">
      <div class="logo-symbol">R</div>
      <div class="logo-text">Raiku</div>

  </div>

  <div class="machine">

        <div class="machine-label">Collection</div>

      </div>

      <canvas id="particleCanvas"></canvas>
      <div class="win-line" id="wl"></div>
      <div class="reels">
        <div class="reel" id="r0"><div class="reel-inner" id="ri0"></div></div>
        <div class="reel" id="r1"><div class="reel-inner" id="ri1"></div></div>
        <div class="reel" id="r2"><div class="reel-inner" id="ri2"></div></div>
      </div>
    </div>

    <div class="machine-bottom">
      <div class="msg" id="msg">PRESS SPIN TO AWAKEN THE DRAGON</div>
      <button class="spin-btn" id="sb" onclick="spin()">SPIN TO BECOME CHAD</button>
      <div class="dots">
        <div class="dot" id="d0"></div>
        <div class="dot" id="d1"></div>
        <div class="dot" id="d2"></div>
      </div>
    </div>
  </div>
  <div class="hint">3x Golden Dragon = Jackpot &nbsp;|&nbsp; 3x Same = Chad &nbsp;|&nbsp; 2x Same = Almost Chad</div>
</div>
<div class="conf-wrap" id="conf"></div>

/* Each strip for a column just alternates between the 2 images */
const STRIP = 20;
let strips = [], positions = [], spinning = false;
let currentResult = [null, null, null];

function buildStrip(colIdx) {
  const s = [];
  for (let i = 0; i < STRIP; i++) {
    // weighted: regular 70%, gold 30%
    s.push(Math.random() < 0.3 ? 1 : 0);
  }
  return s;
}

function getSZ(ri){ return document.getElementById('r'+ri).offsetWidth || 150; }

function initReels(){
  resizeCanvas();
  for(let i=0;i<3;i++){
    strips[i] = buildStrip(i);
    positions[i] = 0;
    const ri = document.getElementById('ri'+i);
    ri.innerHTML = '';
    const sz = getSZ(i);
    for(let j=0;j<STRIP;j++){
      const d = document.createElement('div');
      d.className = 'sym'; d.style.height = sz+'px'; d.style.width = sz+'px';
      const im = document.createElement('img');
      im.src = COL_IMGS[i][strips[i][j]].src;
      im.draggable = false;
      d.appendChild(im); ri.appendChild(d);
    }
    ri.style.transform = 'translateY(0px)';
  }
}

/* ── AUDIO ── */
let muted = false, actx = null;
function getCtx(){ if(!actx) actx = new(window.AudioContext||window.webkitAudioContext)(); return actx; }
function playTone(freq,type,dur,vol=0.3,delay=0){
  if(muted)return;
  try{
    const c=getCtx(),o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);
    o.type=type;o.frequency.setValueAtTime(freq,c.currentTime+delay);
    g.gain.setValueAtTime(0,c.currentTime+delay);
    g.gain.linearRampToValueAtTime(vol,c.currentTime+delay+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001,c.currentTime+delay+dur);
    o.start(c.currentTime+delay);o.stop(c.currentTime+delay+dur+0.05);
  }catch(e){}
}
function playNoise(dur,vol=0.15,delay=0){
  if(muted)return;
  try{
    const c=getCtx(),buf=c.createBuffer(1,c.sampleRate*dur,c.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1);
    const src=c.createBufferSource(),g=c.createGain(),f=c.createBiquadFilter();
    f.type='bandpass';f.frequency.value=600;f.Q.value=0.8;
    src.buffer=buf;src.connect(f);f.connect(g);g.connect(c.destination);
    g.gain.setValueAtTime(0,c.currentTime+delay);
    g.gain.linearRampToValueAtTime(vol,c.currentTime+delay+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001,c.currentTime+delay+dur);
    src.start(c.currentTime+delay);src.stop(c.currentTime+delay+dur+0.05);
  }catch(e){}
}
function soundSpin(){ for(let i=0;i<18;i++){const sp=0.06+i*0.005;playNoise(0.04,0.1,i*sp);playTone(80+Math.random()*40,'square',0.03,0.07,i*sp);} }
function soundTick(){ playTone(220,'square',0.035,0.15);playNoise(0.03,0.1); }
function soundLand(idx,isGold){
  const freqs=isGold?[494,622,784]:[330,392,494];
  playNoise(0.08,0.2);playTone(freqs[idx],'sine',0.3,0.28);playTone(freqs[idx]*2,'sine',0.15,0.1,0.05);
}
function soundWin(){ [523,659,784,1047].forEach((f,i)=>playTone(f,'sine',0.2,0.3,i*0.1)); }
function soundJackpot(){
  const melody=[523,659,784,1047,1319,1047,784,1047,1319,1568];
  melody.forEach((f,i)=>playTone(f,'sine',0.28,0.38,i*0.09));
  [65,82,98].forEach((f,i)=>playTone(f,'sawtooth',0.3,0.42,i*0.06));
}
/* SIGMA CHAD MUSIC — epic arpeggio loop */
let sigmaNodes = [];
function playSigmaChad(){
  if(muted)return;
  stopSigmaChad();
  try{
    const c=getCtx();
    // Power chord bassline
    const bassNotes=[65,73,82,98,110,98,82,73];
    const lead=[392,494,587,698,784,698,587,880,784,659,523,440];
    bassNotes.forEach((f,i)=>{
      for(let rep=0;rep<3;rep++){
        const delay=i*0.2+rep*1.6;
        playTone(f,'sawtooth',0.18,0.35,delay);
        playTone(f*2,'sawtooth',0.18,0.15,delay);
      }
    });
    lead.forEach((f,i)=>{
      for(let rep=0;rep<2;rep++){
        const delay=i*0.1+rep*1.2;
        playTone(f,'square',0.12,0.22,delay);
        playTone(f,'sine',0.1,0.18,delay+0.01);
      }
    });
    // Snare-like hits
    for(let i=0;i<16;i++) playNoise(0.06,0.25,i*0.2);
  }catch(e){}
}
function stopSigmaChad(){ sigmaNodes.forEach(n=>{try{n.stop();}catch(e){}});sigmaNodes=[]; }

function soundButton(){ playTone(440,'sine',0.06,0.2);playTone(880,'sine',0.04,0.1,0.04); }
function toggleMute(){ muted=!muted;document.getElementById('muteBtn').textContent=muted?'SOUND OFF':'SOUND ON'; }

/* ── PARTICLES ── */
const canvas=document.getElementById('particleCanvas');
const pctx=canvas.getContext('2d');
let particles=[],animId=null;
function resizeCanvas(){ const a=document.getElementById('reelsArea');canvas.width=a.offsetWidth;canvas.height=a.offsetHeight; }
function spawnParticles(count,x,y,color){ for(let i=0;i<count;i++){const a=Math.random()*Math.PI*2,sp=1+Math.random()*4;particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,life:1,decay:0.02+Math.random()*0.03,size:2+Math.random()*4,color});} }
function spawnBurst(cx,cy,col){ for(let i=0;i<90;i++){const a=(i/90)*Math.PI*2,sp=2+Math.random()*7;particles.push({x:cx,y:cy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,decay:0.01+Math.random()*0.015,size:2+Math.random()*6,color:Math.random()>0.4?col:'#ffffff'});} }
function animParticles(){ pctx.clearRect(0,0,canvas.width,canvas.height);particles=particles.filter(p=>p.life>0);particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life-=p.decay;pctx.globalAlpha=Math.max(0,p.life);pctx.fillStyle=p.color;pctx.beginPath();pctx.arc(p.x,p.y,p.size,0,Math.PI*2);pctx.fill();});pctx.globalAlpha=1;if(particles.length>0)animId=requestAnimationFrame(animParticles);else animId=null; }
function triggerParticles(count,x,y,color){ spawnParticles(count,x,y,color);if(!animId)animId=requestAnimationFrame(animParticles); }
function getReelCenter(ri){ const area=document.getElementById('reelsArea');const reel=document.getElementById('r'+ri);const aR=area.getBoundingClientRect();const rR=reel.getBoundingClientRect();return{x:rR.left-aR.left+rR.width/2,y:rR.top-aR.top+rR.height/2}; }

function confetti(col){
  const c=document.getElementById('conf');c.innerHTML='';
  const cols=col==='gold'?['#FFD700','#FFA500','#FFEC00','#ffffff','#FFD70080']:['#C0FF38','#8ab828','#e0ff90','#ffffff'];
  for(let i=0;i<120;i++){const p=document.createElement('div');p.className='cp';const sz=4+Math.random()*8;p.style.cssText='left:'+Math.random()*100+'%;background:'+cols[i%cols.length]+';width:'+sz+'px;height:'+sz+'px;border-radius:'+(Math.random()>.5?'50%':'1px')+';animation-duration:'+(1.8+Math.random()*2.5)+'s;animation-delay:'+(Math.random()*0.6)+'s;';c.appendChild(p);}
  setTimeout(()=>c.innerHTML='',7000);
}
function screenFlash(col){ const el=document.getElementById('flashOverlay');el.style.background=col==='gold'?'#FFD700':'var(--neon)';el.className='flash-overlay flash';setTimeout(()=>el.className='flash-overlay',300); }

/* ── SHUFFLE ANIMATION ── */
function runShuffle(reelIdx, durationMs, onDone) {
  const reel = document.getElementById('r' + reelIdx);
  const inner = document.getElementById('ri' + reelIdx);
  const sz = getSZ(reelIdx);
  reel.classList.add('shuffling');
  const imgs = COL_IMGS[reelIdx];
  const start = performance.now();
  let lastSwap = -1;
  
  function shuffleTick(now) {
    const elapsed = now - start;
    const progress = Math.min(elapsed / durationMs, 1);
    // speed: fast at start, slow at end
    const interval = 60 + progress * 200; // 60ms → 260ms
    
    if (elapsed - lastSwap > interval) {
      lastSwap = elapsed;
      // randomly flash a random symbol in the reel
      const syms = inner.querySelectorAll('.sym');
      const pick = Math.floor(Math.random() * syms.length);
      const pickSym = syms[pick];
      const img = pickSym.querySelector('img');
      const newIdx = Math.random() < 0.3 ? 1 : 0;
      img.src = imgs[newIdx].src;
      pickSym.classList.remove('shuffle-flash');
      void pickSym.offsetWidth; // reflow
      pickSym.classList.add('shuffle-flash');
    }
    
    if (progress < 1) {
      requestAnimationFrame(shuffleTick);
    } else {
      reel.classList.remove('shuffling');
      if (onDone) onDone();
    }
  }
  requestAnimationFrame(shuffleTick);
}

/* ── SPIN REEL ── */
function spinReel(reelIdx, tgtImgIdx, dur, cb) {
  const sz = getSZ(reelIdx);
  const el = document.getElementById('ri' + reelIdx);
  const r = document.getElementById('r' + reelIdx);
  r.className = 'reel spinning';
  soundSpin();

  // Force target into strip
  // pick a random position in strip, override its image index
  const tgtPos = Math.floor(Math.random() * STRIP);
  strips[reelIdx][tgtPos] = tgtImgIdx;
  // rebuild DOM for this reel with new strip
  el.innerHTML = '';
  for(let j=0;j<STRIP;j++){
    const d=document.createElement('div');d.className='sym';d.style.height=sz+'px';d.style.width=sz+'px';
    const im=document.createElement('img');im.src=COL_IMGS[reelIdx][strips[reelIdx][j]].src;im.draggable=false;
    d.appendChild(im);el.appendChild(d);
  }
  positions[reelIdx] = 0;
  el.style.transform = 'translateY(0px)';

  const extra = STRIP * 3 + Math.floor(Math.random() * STRIP);
  const total = extra + ((tgtPos - (positions[reelIdx] + extra) % STRIP + STRIP) % STRIP);
  const t0 = performance.now();
  let lastTick = -1;

  function ease(t){ if(t<0.55)return t/0.55;const s=(t-0.55)/0.45;return 1-s*s*0.18; }
  function tick(now){
    const p=Math.min((now-t0)/dur,1),e=ease(p);
    const cur=Math.floor(e*total);
    if(cur!==lastTick){lastTick=cur;if(p<0.88&&Math.random()<0.35)soundTick();}
    el.style.transform='translateY('+(-(positions[reelIdx]+cur)*sz)+'px)';
    if(p<1){ requestAnimationFrame(tick); }
    else {
      positions[reelIdx]=(positions[reelIdx]+total)%STRIP;
      el.style.transform='translateY('+(-(positions[reelIdx])*sz)+'px)';
      const isGold = COL_IMGS[reelIdx][tgtImgIdx].gold;
      currentResult[reelIdx] = tgtImgIdx;
      r.className = isGold ? 'reel landed-gold' : 'reel landed';
      soundLand(reelIdx, isGold);
      const c=getReelCenter(reelIdx);
      triggerParticles(18,c.x,c.y,isGold?'#FFD700':'#C0FF38');
      setTimeout(()=>r.className='reel',600);
      if(cb)cb();
    }
  }
  requestAnimationFrame(tick);
}

function setDot(i, type){
  const d=document.getElementById('d'+i);
  d.className='dot'+(type==='gold'?' active-gold':type==='neon'?' active-neon':'');
}
function setMsg(t,cls){ const e=document.getElementById('msg');e.textContent=t;e.className='msg '+(cls||''); }

/* ── JACKPOT POPUP ── */
function showJackpot(){
  document.getElementById('jpOverlay').classList.add('show');
  playSigmaChad();
}
function closeJackpot(){
  document.getElementById('jpOverlay').classList.remove('show');
  stopSigmaChad();
}

/* ── MAIN SPIN ── */
function spin(){
  if(spinning)return;
  try{getCtx().resume();}catch(e){}
  soundButton();
  const btn=document.getElementById('sb');
  btn.classList.add('pulse-ring');
  setTimeout(()=>btn.classList.remove('pulse-ring'),500);

  spinning=true; btn.disabled=true;
  document.getElementById('wl').classList.remove('active','gold');
  setDot(0,'');setDot(1,'');setDot(2,'');
  setMsg('SPINNING...','');
  document.querySelectorAll('.reel').forEach(r=>r.classList.remove('jackpot-glow'));

  // Random target: 0=regular, 1=gold
  const tgts=[
    Math.random()<0.25?1:0,
    Math.random()<0.25?1:0,
    Math.random()<0.25?1:0,
  ];

  let done=0;
  const DELAYS=[0,220,440];
  const DURS=[1000,1300,1650];

  // Phase 1: shuffle all reels simultaneously for ~600ms
  for(let ri=0;ri<3;ri++){
    (function(i){
      setTimeout(()=>{
        runShuffle(i, 600, ()=>{
          // Phase 2: proper spin after shuffle
          setTimeout(()=>{
            spinReel(i, tgts[i], DURS[i], ()=>{
              setDot(i, tgts[i]===1?'gold':'neon');
              done++;
              if(done===3) setTimeout(resolve, 320);
            });
          }, DELAYS[i]);
        });
      }, i*80);
    })(ri);
  }

  function resolve(){
    const allGold = tgts.every(t=>t===1);
    const allSame = tgts[0]===tgts[1]&&tgts[1]===tgts[2];
    const pair = !allSame&&(tgts[0]===tgts[1]||tgts[1]===tgts[2]||tgts[0]===tgts[2]);

    if(allGold){
      const wl=document.getElementById('wl');
      wl.classList.add('active','gold');
      document.querySelectorAll('.reel').forEach(r=>r.classList.add('jackpot-glow'));
      setMsg('JACKPOT — GOLDEN DRAGON AWAKENED','jackpot');
      screenFlash('gold');
      setTimeout(()=>{
        spawnBurst(canvas.width/2,canvas.height/2,'#FFD700');
        if(!animId)animId=requestAnimationFrame(animParticles);
        confetti('gold');
        setTimeout(showJackpot, 800);
      },100);
    } else if(allSame){
      document.getElementById('wl').classList.add('active');
      setMsg('3 OF A KIND — RAIKU CHAD POWER','win');
      soundWin();
      const c=getReelCenter(1);
      triggerParticles(45,c.x,c.y,'#C0FF38');
    } else if(pair){
      setMsg('ALMOST CHAD','win');
      soundWin();
    } else {
      setMsg('THE DRAGON SLEEPS — TRY AGAIN','');
    }
    spinning=false; btn.disabled=false;
  }
}


window.addEventListener('load',()=>initReels());
window.addEventListener('resize',()=>{resizeCanvas();initReels();});
</script>
</body>
